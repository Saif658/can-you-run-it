<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Can You Run It? (Honestly)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg-primary:#0d1117;
    --bg-secondary:#161b22;
    --bg-card:#1c2333;
    --bg-input:#0d1117;
    --green:#00e676;
    --green-dim:#00c853;
    --green-glow:rgba(0,230,118,.15);
    --yellow:#ffd600;
    --yellow-dim:#ffab00;
    --red:#ff1744;
    --red-dim:#d50000;
    --text-primary:#e6edf3;
    --text-secondary:#8b949e;
    --border:#30363d;
    --gfn-blue:#76b900;
  }
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg-primary);
    color:var(--text-primary);
    min-height:100vh;
    line-height:1.6;
  }
  .container{max-width:1200px;margin:0 auto;padding:0 20px}

  /* Header */
  header{
    background:var(--bg-secondary);
    border-bottom:1px solid var(--border);
    padding:20px 0;
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(10px);
  }
  .header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo svg{width:36px;height:36px}
  .logo h1{font-size:1.4rem;font-weight:700;color:var(--green)}
  .logo h1 span{color:var(--text-secondary);font-weight:400;font-size:.9rem}
  .tagline{color:var(--text-secondary);font-size:.85rem;font-style:italic}

  /* Spec Input Section */
  .spec-section{
    background:var(--bg-secondary);
    border-bottom:1px solid var(--border);
    padding:30px 0;
  }
  .spec-section h2{font-size:1.1rem;margin-bottom:20px;color:var(--green);display:flex;align-items:center;gap:8px}
  .spec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px}
  .spec-group{display:flex;flex-direction:column;gap:6px}
  .spec-group label{font-size:.8rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .spec-group select,.spec-group input{
    background:var(--bg-input);
    border:1px solid var(--border);
    color:var(--text-primary);
    padding:10px 14px;
    border-radius:8px;
    font-size:.9rem;
    transition:border-color .2s,box-shadow .2s;
    outline:none;
    width:100%;
  }
  .spec-group select:focus,.spec-group input:focus{
    border-color:var(--green);
    box-shadow:0 0 0 3px var(--green-glow);
  }
  .spec-group select option{background:var(--bg-secondary);color:var(--text-primary)}
  .preset-bar{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:14px 18px;
    background:var(--green-glow);
    border:1px solid rgba(0,230,118,.2);
    border-radius:10px;
    margin-bottom:20px;
  }
  .preset-bar .label{font-size:.8rem;color:var(--green);font-weight:600;white-space:nowrap}
  .preset-bar .specs{font-size:.8rem;color:var(--text-secondary)}
  .btn{
    background:var(--green);
    color:#000;
    border:none;
    padding:12px 32px;
    border-radius:8px;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    transition:all .2s;
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  .btn:hover{background:var(--green-dim);transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,230,118,.3)}
  .btn:active{transform:translateY(0)}
  .btn-outline{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-secondary);
    padding:8px 16px;
    border-radius:6px;
    font-size:.8rem;
    cursor:pointer;
    transition:all .2s;
  }
  .btn-outline:hover{border-color:var(--green);color:var(--green)}
  .actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}

  /* Results Section */
  .results-section{padding:30px 0 60px}
  .results-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
  .results-header h2{font-size:1.2rem;color:var(--text-primary)}
  .results-header h2 span{color:var(--green)}
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap}
  .filter-btn{
    background:var(--bg-card);
    border:1px solid var(--border);
    color:var(--text-secondary);
    padding:6px 14px;
    border-radius:20px;
    font-size:.8rem;
    cursor:pointer;
    transition:all .2s;
  }
  .filter-btn:hover,.filter-btn.active{border-color:var(--green);color:var(--green);background:var(--green-glow)}
  .summary-bar{
    display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;
  }
  .summary-item{
    display:flex;align-items:center;gap:6px;
    font-size:.85rem;color:var(--text-secondary);
  }
  .summary-item .dot{width:10px;height:10px;border-radius:50%}
  .summary-item .dot.green{background:var(--green)}
  .summary-item .dot.yellow{background:var(--yellow)}
  .summary-item .dot.red{background:var(--red)}

  /* Game Cards */
  .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .game-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    transition:all .25s;
    position:relative;
  }
  .game-card:hover{border-color:rgba(0,230,118,.3);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
  .game-card-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 12px;
    border-bottom:1px solid var(--border);
  }
  .game-title{font-size:1rem;font-weight:700}
  .game-badges{display:flex;gap:6px;align-items:center}
  .badge{
    padding:3px 10px;
    border-radius:12px;
    font-size:.7rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.3px;
  }
  .badge-great{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
  .badge-playable{background:rgba(255,214,0,.12);color:var(--yellow);border:1px solid rgba(255,214,0,.25)}
  .badge-struggles{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.25)}
  .badge-gfn{
    background:rgba(118,185,0,.12);
    color:var(--gfn-blue);
    border:1px solid rgba(118,185,0,.25);
    display:flex;align-items:center;gap:4px;
  }
  .badge-gfn svg{width:12px;height:12px}
  .game-card-body{padding:14px 18px}
  .fps-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;
    border-bottom:1px solid rgba(48,54,61,.5);
  }
  .fps-row:last-child{border-bottom:none}
  .fps-label{font-size:.8rem;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
  .fps-label .setting-dot{width:8px;height:8px;border-radius:50%}
  .fps-value{font-size:.9rem;font-weight:700;font-variant-numeric:tabular-nums}
  .fps-value.great{color:var(--green)}
  .fps-value.playable{color:var(--yellow)}
  .fps-value.struggles{color:var(--red)}
  .game-card-footer{
    padding:10px 18px;
    background:rgba(0,0,0,.15);
    font-size:.75rem;
    color:var(--text-secondary);
    display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:4px;
  }
  .game-card-footer span{display:flex;align-items:center;gap:4px}

  /* Empty State */
  .empty-state{
    text-align:center;padding:60px 20px;
    color:var(--text-secondary);
  }
  .empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.4}
  .empty-state p{font-size:1rem}

  /* Responsive */
  @media(max-width:768px){
    .games-grid{grid-template-columns:1fr}
    .header-inner{flex-direction:column;align-items:flex-start}
    .spec-grid{grid-template-columns:1fr 1fr}
  }
  @media(max-width:480px){
    .spec-grid{grid-template-columns:1fr}
    .logo h1{font-size:1.1rem}
  }

  /* Scrollbar */
  ::-webkit-scrollbar{width:8px}
  ::-webkit-scrollbar-track{background:var(--bg-primary)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}

  /* Animations */
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .game-card{animation:fadeIn .3s ease both}
  .game-card:nth-child(1){animation-delay:.02s}
  .game-card:nth-child(2){animation-delay:.04s}
  .game-card:nth-child(3){animation-delay:.06s}
  .game-card:nth-child(4){animation-delay:.08s}
  .game-card:nth-child(5){animation-delay:.1s}
  .game-card:nth-child(6){animation-delay:.12s}
  .game-card:nth-child(7){animation-delay:.14s}
  .game-card:nth-child(8){animation-delay:.16s}
  .game-card:nth-child(9){animation-delay:.18s}
  .game-card:nth-child(10){animation-delay:.2s}
</style>

    gfn: true,
    fps: { low: [50, 60], med: [40, 55], high: [30, 45] }

];

function evaluateGame(game, cpuScore, gpuScore, ramGB) {
  const cpuOk = cpuScore >= game.minCPU;
  const gpuOk = gpuScore >= game.minGPU;
  const ramOk = ramGB >= game.minRAM;

  const meetsMin = cpuOk && gpuOk && ramOk;
  const meetsRec = cpuScore >= game.recCPU && gpuScore >= game.recGPU && ramGB >= game.recRAM;

  const overallRatio = (
    Math.min(cpuScore / game.recCPU, 1.5) +
    Math.min(gpuScore / game.recGPU, 1.5) +
    Math.min(ramGB / game.recRAM, 1.5)
  ) / 3;

  let tier;
  if (meetsRec) tier = 'great';
  else if (meetsMin) tier = 'playable';
  else if (overallRatio > 0.5) tier = 'playable';
  else tier = 'struggles';

  const hwRatio = (cpuScore / game.recCPU + gpuScore / game.recGPU) / 2;
  const fpsMultiplier = Math.max(0.3, Math.min(1.2, hwRatio));

  const adjustedFps = {
    low: [
      Math.round(game.fps.low[0] * fpsMultiplier),
      Math.round(game.fps.low[1] * fpsMultiplier)
    ],
    med: [
      Math.round(game.fps.med[0] * fpsMultiplier),
      Math.round(game.fps.med[1] * fpsMultiplier)
    ],
    high: [
      Math.round(game.fps.high[0] * fpsMultiplier),
      Math.round(game.fps.high[1] * fpsMultiplier)
    ]
  };

  if (gpuScore <= 9) {
    adjustedFps.low[1] = Math.min(adjustedFps.low[1], 60);
    adjustedFps.med[1] = Math.min(adjustedFps.med[1], 60);
    adjustedFps.high[1] = Math.min(adjustedFps.high[1], 60);
  }

  return { tier, fps: adjustedFps };
}

function getTierLabel(tier) {
  if (tier === 'great') return 'Runs Great';
  if (tier === 'playable') return 'Playable';
  return 'Struggles';
}

function getFpsClass(tier, fpsLow) {
  if (tier === 'great') return 'great';
  if (fpsLow >= 30) return 'playable';
  return 'struggles';
}

function loadPreset() {
  document.getElementById('cpuSelect').value = '4';
  document.getElementById('gpuSelect').value = '2';
  document.getElementById('ramSelect').value = '8';
  document.getElementById('cpuCustom').value = '';
  document.getElementById('gpuCustom').value = '';
  document.getElementById('presetBar').style.display = 'flex';
}

function clearPreset() {
  document.getElementById('cpuSelect').value = '';
  document.getElementById('gpuSelect').value = '';
  document.getElementById('ramSelect').value = '';
  document.getElementById('cpuCustom').value = '';
  document.getElementById('gpuCustom').value = '';
  document.getElementById('presetBar').style.display = 'none';
}

function checkGames() {
  const cpuVal = parseInt(document.getElementById('cpuSelect').value) || 3;
  const gpuVal = parseInt(document.getElementById('gpuSelect').value) || 2;
  const ramVal = parseInt(document.getElementById('ramSelect').value) || 8;
  const cpuCustom = document.getElementById('cpuCustom').value.trim();
  const gpuCustom = document.getElementById('gpuCustom').value.trim();

  const results = GAMES.map(game => {
    const result = evaluateGame(game, cpuVal, gpuVal, ramVal);
    return { ...game, ...result };
  });

  const tierOrder = { great: 0, playable: 1, struggles: 2 };
  results.sort((a, b) => tierOrder[a.tier] - tierOrder[b.tier]);

  renderResults(results, { cpu: cpuCustom || 'CPU Score: ' + cpuVal, gpu: gpuCustom || 'GPU Score: ' + gpuVal, ram: ramVal });
}

function renderResults(results, specs) {
  const counts = { great: 0, playable: 0, struggles: 0 };
  results.forEach(r => counts[r.tier]++);

  let html = '';
  html += '<div class="results-header">';
  html += '<h2>Results for <span>' + specs.cpu + '</span> / <span>' + specs.gpu + '</span> / <span>' + specs.ram + 'GB RAM</span></h2>';
  html += '<div class="filter-bar">';
  html += '<button class="filter-btn active" onclick="filterGames(\'all\', this)">All (' + results.length + ')</button>';
  html += '<button class="filter-btn" onclick="filterGames(\'great\', this)">Runs Great (' + counts.great + ')</button>';
  html += '<button class="filter-btn" onclick="filterGames(\'playable\', this)">Playable (' + counts.playable + ')</button>';
  html += '<button class="filter-btn" onclick="filterGames(\'struggles\', this)">Struggles (' + counts.struggles + ')</button>';
  html += '</div></div>';

  html += '<div class="summary-bar">';
  html += '<div class="summary-item"><span class="dot green"></span> ' + counts.great + ' runs great</div>';
  html += '<div class="summary-item"><span class="dot yellow"></span> ' + counts.playable + ' playable</div>';
  html += '<div class="summary-item"><span class="dot red"></span> ' + counts.struggles + ' struggles</div>';
  html += '</div>';

  html += '<div class="games-grid" id="gamesGrid">';

  results.forEach(game => {
    const gfnBadge = game.gfn
      ? '<span class="badge badge-gfn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>GFN</span>'
      : '';

    const lowClass = getFpsClass(game.tier, game.fps.low[0]);
    const medClass = getFpsClass(game.tier, game.fps.med[0]);
    const highClass = getFpsClass(game.tier, game.fps.high[0]);

    html += '<div class="game-card" data-tier="' + game.tier + '">';
    html += '<div class="game-card-header">';
    html += '<div><div class="game-title">' + game.name + '</div>';
    html += '<div style="font-size:.75rem;color:var(--text-secondary);margin-top:2px">' + game.genre + '</div></div>';
    html += '<div class="game-badges">';
    html += '<span class="badge badge-' + game.tier + '">' + getTierLabel(game.tier) + '</span>';
    html += gfnBadge;
    html += '</div></div>';

    html += '<div class="game-card-body">';
    html += '<div class="fps-row">';
    html += '<span class="fps-label"><span class="setting-dot" style="background:var(--green)"></span> Low Settings</span>';
    html += '<span class="fps-value ' + lowClass + '">' + game.fps.low[0] + '-' + game.fps.low[1] + ' FPS</span>';
    html += '</div>';
    html += '<div class="fps-row">';
    html += '<span class="fps-label"><span class="setting-dot" style="background:var(--yellow)"></span> Medium Settings</span>';
    html += '<span class="fps-value ' + medClass + '">' + game.fps.med[0] + '-' + game.fps.med[1] + ' FPS</span>';
    html += '</div>';
    html += '<div class="fps-row">';
    html += '<span class="fps-label"><span class="setting-dot" style="background:var(--red)"></span> High Settings</span>';
    html += '<span class="fps-value ' + highClass + '">' + game.fps.high[0] + '-' + game.fps.high[1] + ' FPS</span>';
    html += '</div></div>';

    html += '<div class="game-card-footer">';
    html += '<span>Min: RAM ' + game.minRAM + 'GB</span>';
    html += '<span>Rec: RAM ' + game.recRAM + 'GB</span>';
    html += '</div></div>';
  });

  html += '</div>';
  document.getElementById('resultsArea').innerHTML = html;
}

function filterGames(tier, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.game-card').forEach(card => {
    if (tier === 'all' || card.dataset.tier === tier) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

loadPreset();
</script>
</body>
</html>
